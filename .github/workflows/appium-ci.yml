name: Cross-Platform Appium Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  android-tests:
    name: Run Android Tests
    runs-on: macos-latest # Using a Mac for a FAST Android Emulator
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & UIAutomator2
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Download Android APK
        # Create the folder and download APK using the name specified in config.properties
        run: |
          mkdir -p src/test/resources/apps
          curl -L "https://github.com/saucelabs/my-demo-app-rn/releases/download/v1.3.0/Android-MyDemoAppRN.1.3.0.build-244.apk" -o src/test/resources/apps/Android-MyDemoAppRN.1.3.0.build-244.apk

      - name: Run Appium and Android Tests
        # A special action to ensure the Android emulator runs smoothly
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          script: |
            appium --log-timestamp --log appium.log &
            sleep 10
            mvn clean test -DplatformName=android

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-android
          path: target/allure-results

  ios-tests:
    name: Run iOS Tests
    runs-on: macos-latest # Required for iOS (includes Xcode)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & XCUITest
        run: |
          npm install -g appium
          appium driver install xcuitest

      - name: Download and Unzip iOS App
        run: |
          mkdir -p src/test/resources/apps
          curl -L "https://github.com/saucelabs/my-demo-app-rn/releases/download/v1.3.0/iOS-Simulator-MyRNDemoApp.1.3.0-162.zip" -o src/test/resources/apps/app.zip
          unzip src/test/resources/apps/app.zip -d src/test/resources/apps/
          rm src/test/resources/apps/app.zip

      - name: Pre-boot iOS Simulator
        # Launch the simulator in advance so that Appium doesn't waste time on it and doesn't time out
        run: xcrun simctl boot "iPhone 15 Pro" || true

      - name: Run Appium and iOS Tests
        run: |
          appium --log-timestamp --log appium.log &
          sleep 10
          mvn clean test -DplatformName=ios

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ios
          path: target/allure-results